<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ResolveX Intelligence</title>

<link rel="stylesheet" href="style.css">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<script defer src="app.js"></script>

</head>


<body>

<header>

<h1>ResolveX Intelligence</h1>

<select id="deviceSelect">

<option value="">Select Device</option>
<option value="ventilator">Ventilator</option>
<option value="ecg">ECG Monitor</option>
<option value="infusion">Infusion Pump</option>
<option value="mri">MRI Console</option>
<option value="ultrasound">Ultrasound</option>
<option value="xray">X-Ray</option>
<option value="ct">CT Scanner</option>
<option value="monitor">Patient Monitor</option>

</select>

</header>


<section class="layout">

<!-- LEFT PANEL -->

<div class="controls">

<button onclick="startLiveMonitoring()">Live Monitoring</button>

<button onclick="simulateDigitalTwin()">Digital Twin Simulation</button>

<button onclick="generateFaultTree()">Generate Fault Tree</button>

<button onclick="sensorDiagnostics()">Sensor Diagnostics</button>

<button onclick="saveRepair()">Save Repair Knowledge</button>

<button onclick="voiceAsk()">🎤 Voice Troubleshoot</button>

</div>


<!-- CENTER PANEL -->

<div class="viewer">

<model-viewer
id="deviceModel"
src="models/device.glb"
camera-controls
auto-rotate
shadow-intensity="1"
exposure="1">

</model-viewer>

<div id="dashboard"></div>

</div>


<!-- RIGHT PANEL -->

<div class="chat">

<h2>ResolveX Assistant</h2>

<input id="message"
placeholder="Ask troubleshooting question...">

<button onclick="sendMessage()">Ask AI</button>

<div id="chatBox"></div>

</div>

</section>

</body>

</html>
